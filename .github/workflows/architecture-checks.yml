name: Architecture Checks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Run boundary checks
        run: ./scripts/check-boundaries.sh
